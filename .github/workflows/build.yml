# PDAL native + python binding 을 묶은 self-contained wheel 을 빌드해 GitHub Releases 에 publish.
# `dronesquare-organization/dronesquare-backend` 의 pyproject.toml `[tool.uv.sources] pdal` 이
# 그 wheel URL 을 가리켜 backend docker build / CI / 로컬 에서 PDAL source build 가 발생하지 않는다.
# workflow_dispatch 로 PDAL 버전 갱신 시 수동 트리거 (PDAL/PROJ/GEOS/libgeotiff/GDAL/PDAL 버전 input).
#
# Matrix:
#   - Linux x86_64 (ubuntu-latest): manylinux_2_28 + source build (manylinux 의 dnf 가 GDAL 3.12 미충족)
#   - Linux aarch64 (ubuntu-24.04-arm): manylinux_2_28 + source build — backend prod (Graviton t4g.large)
#   - macOS arm64 (macos-14, Apple Silicon): brew 의 PDAL/GDAL/PROJ/GEOS/libgeotiff + delocate bundle.
#     macOS dev 머신 (Apple Silicon) 에서 `uv sync` 만으로 PDAL 자동 install.
name: pdal-wheel-build

on:
  workflow_dispatch:
    inputs:
      pdal_native_version:
        description: "PDAL native (C++) version — https://github.com/PDAL/PDAL/releases"
        type: string
        default: "2.10.1"
      pdal_python_version:
        description: "PDAL/python tag — https://github.com/PDAL/python/releases"
        type: string
        default: "3.5.3"
      python_minor:
        description: "Python minor version (예: 3.14)"
        type: string
        default: "3.14"
      proj_version:
        description: "PROJ version"
        type: string
        default: "9.8.1"
      geos_version:
        description: "GEOS version"
        type: string
        default: "3.14.1"
      gdal_version:
        description: "GDAL version — 3.13.0 은 신생, 3.12.4 가 보수적"
        type: string
        default: "3.12.4"
      libgeotiff_version:
        description: "libgeotiff version"
        type: string
        default: "1.7.4"

permissions:
  contents: write

jobs:
  build:
    name: "build wheel (${{ matrix.arch }})"
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runs_on: ubuntu-latest,    arch: x86_64,  cibw_arch: x86_64,  cibw_platform: manylinux }
          - { runs_on: ubuntu-24.04-arm, arch: aarch64, cibw_arch: aarch64, cibw_platform: manylinux }
          - { runs_on: macos-14,         arch: arm64,   cibw_arch: arm64,   cibw_platform: macosx }
    env:
      PDAL_NATIVE_VERSION: ${{ inputs.pdal_native_version || '2.10.1' }}
      PDAL_PYTHON_VERSION: ${{ inputs.pdal_python_version || '3.5.3' }}
      PYTHON_MINOR: ${{ inputs.python_minor || '3.14' }}
      PROJ_VERSION: ${{ inputs.proj_version || '9.8.1' }}
      GEOS_VERSION: ${{ inputs.geos_version || '3.14.1' }}
      GDAL_VERSION: ${{ inputs.gdal_version || '3.12.4' }}
      LIBGEOTIFF_VERSION: ${{ inputs.libgeotiff_version || '1.7.4' }}
    steps:
      - name: Checkout PDAL/python source
        uses: actions/checkout@v6.0.2
        with:
          repository: PDAL/python
          ref: ${{ env.PDAL_PYTHON_VERSION }}
          path: pdal-python

      - name: Compute Python ABI tag
        id: pytag
        run: |
          minor_no_dot=$(echo "${{ env.PYTHON_MINOR }}" | tr -d '.')
          echo "py_tag=cp${minor_no_dot}" >> "$GITHUB_OUTPUT"

      - name: Build wheel
        uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: pdal-python
          output-dir: wheelhouse
        env:
          # platform tag 는 matrix.cibw_platform 으로 분기 (manylinux_{arch} | macosx_{arch}).
          # cibuildwheel 이 OS 에 매치 안 되는 BEFORE_ALL_* / REPAIR_WHEEL_COMMAND_* 는 자동 무시.
          CIBW_BUILD: "${{ steps.pytag.outputs.py_tag }}-${{ matrix.cibw_platform }}_${{ matrix.cibw_arch }}"
          CIBW_ARCHS_LINUX: ${{ matrix.cibw_arch }}
          CIBW_ARCHS_MACOS: ${{ matrix.cibw_arch }}
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_MACOS: |
            # macos-14 runner 의 brew 가 PDAL 2.10 + 모든 deps (libgdal 3.12, libgeos, libproj,
            # libgeotiff, libcurl, libxml2, ...) 최신 keg 제공 — Linux 의 source build 회피.
            # delocate-wheel 이 brew 의 dylib 들을 wheel 안에 bundle (=auditwheel manylinux 대응).
            brew update
            brew install proj geos libgeotiff gdal pdal
          CIBW_ENVIRONMENT_MACOS: >-
            MACOSX_DEPLOYMENT_TARGET=14.0
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: "delocate-wheel --require-archs ${{ matrix.cibw_arch }} -w {dest_dir} {wheel}"
          CIBW_BEFORE_ALL_LINUX: |
            set -eux
            dnf install -y \
                libcurl-devel libxml2-devel sqlite-devel libtiff-devel \
                zlib-devel openssl-devel \
                ninja-build

            cd /tmp

            echo "=== PROJ ${{ env.PROJ_VERSION }} ==="
            curl -fsSL "https://download.osgeo.org/proj/proj-${{ env.PROJ_VERSION }}.tar.gz" | tar xz
            cmake -S "proj-${{ env.PROJ_VERSION }}" -B build-proj -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DCMAKE_INSTALL_LIBDIR=lib \
                -DBUILD_TESTING=OFF -DENABLE_CURL=ON
            cmake --build build-proj --target install --parallel
            rm -rf build-proj "proj-${{ env.PROJ_VERSION }}"
            ldconfig

            echo "=== GEOS ${{ env.GEOS_VERSION }} ==="
            curl -fsSL "https://github.com/libgeos/geos/releases/download/${{ env.GEOS_VERSION }}/geos-${{ env.GEOS_VERSION }}.tar.bz2" | tar xj
            cmake -S "geos-${{ env.GEOS_VERSION }}" -B build-geos -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DCMAKE_INSTALL_LIBDIR=lib \
                -DBUILD_TESTING=OFF -DBUILD_DOCUMENTATION=OFF
            cmake --build build-geos --target install --parallel
            rm -rf build-geos "geos-${{ env.GEOS_VERSION }}"
            ldconfig

            echo "=== libgeotiff ${{ env.LIBGEOTIFF_VERSION }} ==="
            curl -fsSL "https://github.com/OSGeo/libgeotiff/releases/download/${{ env.LIBGEOTIFF_VERSION }}/libgeotiff-${{ env.LIBGEOTIFF_VERSION }}.tar.gz" | tar xz
            cmake -S "libgeotiff-${{ env.LIBGEOTIFF_VERSION }}" -B build-geotiff -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DCMAKE_INSTALL_LIBDIR=lib \
                -DCMAKE_PREFIX_PATH=/usr/local
            cmake --build build-geotiff --target install --parallel
            rm -rf build-geotiff "libgeotiff-${{ env.LIBGEOTIFF_VERSION }}"
            ldconfig

            echo "=== GDAL ${{ env.GDAL_VERSION }} ==="
            # GTIFGetOGISDefn / GTIFSetFromOGISDefn 는 GDAL 의 frmts/gtiff/gt_wkt_srs.cpp 에 있고
            # GDAL 이 internal libgeotiff fork 빌드 시만 export (PDAL issue #1575).
            curl -fsSL "https://github.com/OSGeo/gdal/releases/download/v${{ env.GDAL_VERSION }}/gdal-${{ env.GDAL_VERSION }}.tar.gz" | tar xz
            cmake -S "gdal-${{ env.GDAL_VERSION }}" -B build-gdal -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DCMAKE_INSTALL_LIBDIR=lib \
                -DCMAKE_PREFIX_PATH=/usr/local \
                -DBUILD_TESTING=OFF -DBUILD_DOCS=OFF -DBUILD_APPS=OFF \
                -DBUILD_PYTHON_BINDINGS=OFF \
                -DGDAL_USE_TIFF_INTERNAL=ON \
                -DGDAL_USE_GEOTIFF_INTERNAL=ON
            cmake --build build-gdal --target install --parallel
            rm -rf build-gdal "gdal-${{ env.GDAL_VERSION }}"
            ldconfig

            echo "=== PDAL ${{ env.PDAL_NATIVE_VERSION }} ==="
            curl -fsSL "https://github.com/PDAL/PDAL/releases/download/${{ env.PDAL_NATIVE_VERSION }}/PDAL-${{ env.PDAL_NATIVE_VERSION }}-src.tar.bz2" | tar xj
            cmake -S "PDAL-${{ env.PDAL_NATIVE_VERSION }}-src" -B build-pdal -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DCMAKE_INSTALL_LIBDIR=lib \
                -DCMAKE_PREFIX_PATH=/usr/local \
                -DBUILD_PLUGIN_PYTHON=OFF \
                -DWITH_TESTS=OFF -DWITH_LASZIP=OFF
            cmake --build build-pdal --target install --parallel
            rm -rf build-pdal "PDAL-${{ env.PDAL_NATIVE_VERSION }}-src"
            ldconfig
          CIBW_ENVIRONMENT_LINUX: >-
            CMAKE_PREFIX_PATH=/usr/local
            PKG_CONFIG_PATH=/usr/local/lib/pkgconfig
            LD_LIBRARY_PATH=/usr/local/lib
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair -w {dest_dir} {wheel}"

      - name: Inspect wheel (Linux / auditwheel)
        if: runner.os == 'Linux'
        run: |
          ls -la wheelhouse/
          python -m pip install --user auditwheel
          for whl in wheelhouse/*.whl; do
            echo "=== auditwheel show $whl ==="
            python -m auditwheel show "$whl"
          done

      - name: Inspect wheel (macOS / delocate)
        if: runner.os == 'macOS'
        run: |
          ls -la wheelhouse/
          python -m pip install --user delocate
          for whl in wheelhouse/*.whl; do
            echo "=== delocate-listdeps $whl ==="
            python -m delocate.cmd.delocate_listdeps "$whl"
          done

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v3.0.0
        with:
          # 단일 release tag 에 모든 platform wheel asset 첨부 (matrix 각 job 이 동시 append).
          tag_name: pdal-${{ env.PDAL_PYTHON_VERSION }}-${{ steps.pytag.outputs.py_tag }}
          name: "PDAL python ${{ env.PDAL_PYTHON_VERSION }} (${{ steps.pytag.outputs.py_tag }}, multi-platform)"
          body: |
            Pre-built PDAL python wheels (self-contained — no system PDAL required).

            - **PDAL native**: ${{ env.PDAL_NATIVE_VERSION }}
            - **PDAL python**: ${{ env.PDAL_PYTHON_VERSION }}
            - **Python ABI**: ${{ steps.pytag.outputs.py_tag }}
            - **Platforms**: manylinux_2_28_x86_64, manylinux_2_28_aarch64, macosx_arm64
            - **Bundled native deps**: libpdal, libgdal, libgeos, libproj, libgeotiff, libcurl, libxml2, libsqlite3, ...
              (Linux: auditwheel + source build / macOS: delocate-wheel + brew keg)
          files: wheelhouse/*.whl
          fail_on_unmatched_files: false
